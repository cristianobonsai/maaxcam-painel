# /etc/nginx/sites-available/painel.maaxcam.com.br
# SPA estática (React build) servida de /opt/painel/dist
# Rode o certbot depois para adicionar o bloco SSL (mesmo padrão dos outros domínios).

server {
    listen 80;
    listen [::]:80;
    server_name painel.maaxcam.com.br;

    root /opt/painel/dist;
    index index.html;

    # SPA: qualquer rota cai no index.html (necessário p/ React Router na Fase 2)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo nos assets com hash; HTML nunca em cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
